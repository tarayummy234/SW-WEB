<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sweet 16 Charts</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="home">
  <header class="site-header">
    <h1>Sweet 16 Charts</h1>
    <p>The official Sweet 16 music charts</p>
  </header>

  <main>
    <section class="home-hero">
      <span class="home-kicker">Sweet 16 Charts</span>

      <h2>The weekly music chart universe.</h2>

      <p>
        Track the biggest songs, albums, videos, streaming hits, sales leaders,
        radio records, artist histories, year-end rankings, and certifications.
      </p>
    </section>

    <div id="homeNews"></div>

    <h2 class="home-section-title">Latest #1s</h2>

    <section id="homeChartPreviews" class="home-preview-grid">
      <p class="loading-message">Loading latest #1 chart previews...</p>
    </section>
  </main>

  <audio id="audioPlayer" class="audio-player" controls></audio>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="config.js"></script>
  <script src="artist-data.js"></script>
  <script src="site-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
